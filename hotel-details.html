<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Details | Alexia's Tours</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="hotel-hero" id="hotel-hero-bg" style="height: 60vh; background-size: cover; background-position: center; position: relative;">
        <div class="overlay" style="position: absolute; inset: 0; background: rgba(0,0,0,0.4);"></div>
        <div class="container h-100 d-flex flex-column justify-content-end pb-5" style="position: relative; z-index: 2;">
            <h1 class="display-3 fw-bold text-white" id="hotel-name">Loading Hotel...</h1>
            <p class="text-white fs-5"><i class="ri-map-pin-2-fill text-warning"></i> <span id="hotel-location">-</span></p>
        </div>
    </div>

    <div class="container py-5">
        <div class="row g-5">
            <div class="col-lg-8">
                <h3 class="fw-bold mb-4">About the Accommodation</h3>
                <div id="hotel-description" class="lead-text mb-5">
                    </div>

                <h4 class="fw-bold mb-3">Amenities & Facilities</h4>
                <div class="row g-3" id="amenities-list">
                    <div class="col-6 col-md-4"><i class="ri-wifi-line text-primary"></i> Free WiFi</div>
                    <div class="col-6 col-md-4"><i class="ri-moped-line text-primary"></i> Free Parking</div>
                    <div class="col-6 col-md-4"><i class="ri-restaurant-line text-primary"></i> Restaurant</div>
                    <div class="col-6 col-md-4"><i class="ri-temp-hot-line text-primary"></i> Swimming Pool</div>
                </div>

                <div class="mt-5">
    <h4 class="fw-bold mb-3">Location & Surroundings</h4>
    <div class="rounded-4 overflow-hidden shadow-sm" style="height: 350px;">
        <iframe 
            id="google-map"
            width="100%" 
            height="100%" 
            style="border:0;" 
            allowfullscreen="" 
            loading="lazy" 
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </div>
</div>
                
            </div>

           <div class="col-lg-4">
    <div class="card border-0 shadow-lg p-4 sticky-top" style="top: 100px;">
        <h5 class="fw-bold">Price per Night</h5>
        <h2 class="text-primary fw-bold mb-4" id="hotel-price">KSH 0</h2>
        <hr>
        <p class="small text-muted">Check-in: 2:00 PM | Check-out: 10:00 AM</p>
        
<a href="#" id="book-link" class="btn btn-warning w-100 fw-bold py-3 mb-2">Reserve Now</a>        
        <button onclick="contactWhatsApp()" class="btn btn-outline-success w-100 fw-bold py-2">
            <i class="ri-whatsapp-line"></i> Chat with Alexia
        </button>
    </div>
</div>
            
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="userjs/hotel-details.js"></script>
</body>
</html>
