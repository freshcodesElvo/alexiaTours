<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour Details | Alexia's Tours</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="tour-hero" id="tour-hero-bg" style="height: 50vh; background-size: cover; background-position: center; position: relative;">
        <div class="overlay" style="position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.7));"></div>
        <div class="container h-100 d-flex flex-column justify-content-end pb-4" style="position: relative; z-index: 2;">
            <span class="badge bg-warning text-dark mb-2 px-3 py-2 rounded-pill" id="tour-category" style="width: fit-content;"></span>
            <h1 class="display-4 fw-bold text-white" id="tour-title">Loading Tour...</h1>
        </div>
    </div>

    <div class="bg-white border-bottom shadow-sm sticky-top" style="top: 0; z-index: 1000;">
        <div class="container py-3">
            <div class="row align-items-center">
                <div class="col-md-8 d-flex gap-4">
                    <div class="d-flex align-items-center">
                        <i class="ri-time-line ri-xl text-warning me-2"></i>
                        <div>
                            <small class="text-muted d-block">Duration</small>
                            <strong id="tour-duration">-</strong>
                        </div>
                    </div>
                    <div class="d-flex align-items-center border-start ps-4">
                        <i class="ri-money-dollar-circle-line ri-xl text-warning me-2"></i>
                        <div>
                            <small class="text-muted d-block">Starting From</small>
                            <strong id="tour-price">KSH 0</strong>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

  <div class="container py-5">
    <div class="row g-5">
        
        <div class="col-lg-8">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                    <li class="breadcrumb-item active">Tour Details</li>
                </ol>
            </nav>

            <h2 class="fw-bold mb-4">Tour Overview</h2>
            <div id="tour-description" class="tour-text-content">
                </div>

            <hr class="my-5">

            <h3 class="fw-bold mb-4">What's Included</h3>
            <div class="row">
                <div class="col-md-6">
                    <ul class="list-unstyled">
                        <li class="mb-2"><i class="ri-check-line text-success me-2"></i> Professional Guide</li>
                        <li class="mb-2"><i class="ri-check-line text-success me-2"></i> Transport in 4x4 Cruiser</li>
                    </ul>
                </div>
                <div class="col-md-6">
                    <ul class="list-unstyled">
                        <li class="mb-2"><i class="ri-check-line text-success me-2"></i> Park Entrance Fees</li>
                        <li class="mb-2"><i class="ri-check-line text-success me-2"></i> Bottled Water</li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="sticky-top" style="top: 100px;">
                <div class="card border-0 shadow-lg p-4 rounded-4 bg-dark text-white">
                    <h4 class="fw-bold mb-3">Tour Summary</h4>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Price:</span>
                        <strong class="text-warning" id="tour-price">KSH 0</strong>
                    </div>
                    <div class="d-flex justify-content-between mb-4">
                        <span>Duration:</span>
                        <strong id="tour-duration">0 Days</strong>
                    </div>
                    <a href="book.html" class="btn btn-warning w-100 fw-bold py-3 rounded-pill shadow">Book This Tour</a>
                </div>
            </div>
        </div>

    </div>
</div>

    <div id="footer-placeholder"></div>

    <script src="userjs/package-details.js?v=1.2"></script></body>
</html>
