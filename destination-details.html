<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destination Details | Alexia's Tours</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">


    <style>
        .tour-details-text p {
    color: #4a4a4a;
    line-height: 1.8;
    margin-bottom: 1.5rem;
}

/* Add a slight gradient to the hero image for better text readability */
.destination-hero {
    background-attachment: fixed; /* Parallax effect */
}

#dest-name {
    text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
    letter-spacing: -1px;
}
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>
     <script>
    fetch('navbar.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('navbar-placeholder').innerHTML = data;
      });
  </script>

    <div class="destination-hero" id="hero-bg" style="height: 60vh; background-size: cover; background-position: center; position: relative;">
        <div class="overlay" style="position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.4);"></div>
        <div class="container h-100 d-flex align-items-end pb-5" style="position: relative; z-index: 2;">
            <h1 class="display-3 fw-bold text-white" id="dest-name">Loading...</h1>
        </div>
    </div>
<div class="container py-5">
    <div class="row">
        <div class="col-lg-8">
            <div class="mb-5">
                <h2 class="fw-bold mb-4" style="color: #2d3436;">Overview</h2>
                <div id="dest-description" class="tour-details-text fs-5"></div>
            </div>
            
            <div class="p-4 rounded-4 bg-warning bg-opacity-10 border border-warning border-1 mb-5">
                <h4 class="fw-bold"><i class="ri-lightbulb-flash-line" id="why-vist"></i></h4>
                <p class="mb-0">Explore the unique charm and hidden gems of this world-class destination.</p>
            </div>
        </div>
        
        <div class="col-lg-4">
            <div class="sticky-top" style="top: 100px;">
                <div class="card border-0 shadow-lg p-4 rounded-4 mb-4">
                    <h5 class="fw-bold mb-3">Quick Facts</h5>
                    <ul class="list-unstyled">
                        <li class="mb-2"><i class="ri-map-pin-line text-warning me-2"></i> <strong>Location:</strong> Kenya</li>
                        <li class="mb-2"><i class="ri-calendar-check-line text-warning me-2"></i> <strong>Best Time:</strong> All Year</li>
                        <li class="mb-2"><i class="ri-camera-line text-warning me-2"></i> <strong>Activity:</strong> Sightseeing</li>
                    </ul>
                    <hr>
                    <a href="contact.html" class="btn btn-warning w-100 fw-bold py-3 rounded-pill shadow">Book This Adventure</a>
                </div>
            </div>
        </div>
    </div>
</div>

    <div id="footer-placeholder"></div>

    <script src="userjs/destination-details.js"></script>
</body>
</html>
