<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Manage Packages</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

<style>


body{
    background:#f4f6f9;
}

/* Sidebar */
.sidebar{
    height:100vh;
    background:#111;
    color:white;
    position:fixed;
    width:240px;
    padding-top:20px;
}

.sidebar h4{
    text-align:center;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:#ccc;
    padding:12px 20px;
    text-decoration:none;
    transition:0.3s;
}

.sidebar a:hover{
    background:#FFC107;
    color:black;
}

/* Main content */
.main{
    margin-left:240px;
    padding:20px;
}

</style>

</head>
<body>

<!-- Sidebar -->
  <div id="navbar-placeholder"></div>

  <script>
    fetch('adminNavbar.html')
      .then(response => response.text())
      .then(data => {
        document.getElementById('navbar-placeholder').innerHTML = data;
      });
  </script>

<div class="main">

<h2>Manage Packages</h2>

<button class="btn btn-warning mb-3" data-bs-toggle="modal" data-bs-target="#packageModal">
Add Package
</button>



<table class="table table-striped">

<thead>
<tr>
<th>ID</th>
<th>Title</th>
<th>Destination</th>
<th>Price</th>
<th>Duration</th>
<th>Action</th>
</tr>
</thead>

<tbody id="packagesTable">
</tbody>

</table>

</div>

<!-- Add Package Modal -->
<div class="modal fade" id="packageModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Add New Package</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <form id="packageForm">
          <input type="hidden" id="packageId">


          <div class="row g-3">

            <div class="col-md-6">
              <label class="form-label">Package Title</label>
              <input type="text" id="title" class="form-control" required>
            </div>

            <div class="col-md-6">
              <label class="form-label">Price (Ksh)</label>
              <input type="number" id="price" class="form-control" required>
            </div>

            <div class="col-md-6">
              <label class="form-label">Days</label>
              <input type="number" id="days" class="form-control" required>
            </div>

            <div class="col-md-6">
              <label class="form-label">Nights</label>
              <input type="number" id="nights" class="form-control" required>
            </div>

            <div class="col-md-6">
              <label class="form-label">Destination ID</label>
              <input type="number" id="destination" class="form-control">
            </div>

            <div class="col-md-6">
              <label class="form-label">Image URL</label>
              <input type="text" id="image" class="form-control">
            </div>

            <div class="col-12">
              <label class="form-label">Description</label>
              <textarea id="description" class="form-control"></textarea>
            </div>

          </div>

        </form>

      </div>

      <div class="modal-footer">

        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Cancel
        </button>

        <button class="btn btn-warning" onclick="savePackage()">
          Save Package
        </button>

      </div>

    </div>
  </div>
</div>


<script src="packages.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
