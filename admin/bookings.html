<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Bookings</title>
    
    <link rel="stylesheet" href="./css/admin.css">
      <link rel="stylesheet" href="../assets/css/style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body>
    <div id="nav-placeholder"></div>

    <script>
        fetch('nav.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('nav-placeholder').innerHTML = data;
            });
    </script>
    <div id="navbar-placeholder"></div>

    <script>
        fetch('adminNavbar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-placeholder').innerHTML = data;
            });
    </script>

    <div class="admin-layout" style="margin-top: 5em;">
        <main class="main-content">
            <div class="content-header d-flex justify-content-between align-items-center mb-4">
                <h1>Bookings Management</h1>
                <div class="search-container">
                    <input type="text" id="searchInput" class="form-control" placeholder="Search by name, email, or destination..." />
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="table-responsive">
                    <table class="table styled-table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Destination</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th class="text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="bookingsTable">
                            </tbody>
                    </table>
                </div>

                <div id="pagination" class="pagination d-flex justify-content-center p-3">
                    </div>
            </div>
        </main>
    </div>

    <div id="bookingModal" class="modall">
        <div class="modall-content">
            <div class="d-flex justify-content-between align-items-center border-bottom pb-2 mb-3">
                <h2 class="h5 mb-0">Booking Record</h2>
                <span onclick="closeModal()" class="close" style="cursor: pointer; font-size: 1.5rem;">&times;</span>
            </div>
            <div id="modallContent">
                </div>
            <div class="text-end mt-4">
                <button class="btn btn-secondary" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="bookings.js"></script>
</body>
</html>
