<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Stay | Alexia's Tours</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">
    <div id="navbar-placeholder"></div>

    <div class="container py-5">
        <div class="row g-4">
            <div class="col-lg-7">
                <div class="card border-0 shadow-sm p-4 rounded-4">
                    <h2 class="fw-bold mb-4">Hotel Reservation</h2>
                    <form id="hotel-booking-form">
                        <input type="hidden" id="hotel-id" name="hotel_id">
                        
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" name="customer_name" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" name="customer_email" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Check-in Date</label>
                                <input type="date" class="form-control" name="check_in" id="check_in" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Check-out Date</label>
                                <input type="date" class="form-control" name="check_out" id="check_out" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Room Type</label>
                                <select class="form-select" name="room_type">
                                    <option value="Standard">Standard Room</option>
                                    <option value="Deluxe">Deluxe Room</option>
                                    <option value="Suite">Executive Suite</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Guests</label>
                                <input type="number" class="form-control" name="guests" min="1" value="1">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Special Requests</label>
                                <textarea class="form-control" name="message" rows="3" placeholder="e.g. Airport pickup, late check-in..."></textarea>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 mt-4 shadow">Confirm Booking Request</button>
                    </form>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="card border-0 bg-primary text-white p-4 rounded-4 sticky-top" style="top: 100px;">
                    <h4 class="fw-bold mb-3">Booking Summary</h4>
                    <div id="summary-content">
                        <h5 id="summary-hotel-name">Loading hotel...</h5>
                        <p id="summary-location" class="small opacity-75"></p>
                        <hr>
                        <div class="d-flex justify-content-between">
                            <span>Price per night:</span>
                            <span id="summary-price">Ksh 0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="userjs/book-hotel.js"></script>
</body>
</html>
